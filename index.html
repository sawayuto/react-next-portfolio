<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Advanced Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button onclick="toggleMode()" class="mode">🌙 モード切替</button>
<div class="container">
<div class="card">
<!-- プロフィール -->
<div class="profile fadein">
<div class="avatar">👤</div>
</div>
<h1 id="typing"></h1>
<div class="tag">Student / Creator</div>
<p>

      Web制作やSNS発信に挑戦中。  

      将来はデザインや動画編集の仕事にも興味があります。
</p>
<!-- 基本情報 -->
<div class="section fadein">
<h2>基本情報</h2>
<p>年齢：19歳</p>
<p>興味：サッカー /ゴルフ  /ドライブ /サウナ </p>
<p>好きな食べ物：たこ焼き</p>
<p>現在の時刻：<span id="clock"></span></p>
</div>
<!-- スキル -->
<div class="section fadein">
<h2>スキル</h2>
<div class="skill">

        HTML
<div class="bar"><div class="fill w85"></div></div>
</div>
<div class="skill">

        CSS
<div class="bar"><div class="fill w75"></div></div>
</div>
<div class="skill">

        動画編集
<div class="bar"><div class="fill w90"></div></div>
</div>
<div class="skill">

        SNS運用
<div class="bar"><div class="fill w80"></div></div>
</div>
</div>
<!-- 目標 -->
<div class="section fadein">
<h2>今後の目標</h2>
<p>

        JavaScriptを学び、動きのあるWebサイトを作れるようになりたいです。
</p>
<p>

        動画制作とWebを組み合わせた発信にも挑戦していきたいです。
</p>
</div>

</div>
</div>
</div>
</div>
<!-- JavaScript -->
<script>

/* タイピング */

const text = "澤 勇翔";

let i = 0;

const typing = document.getElementById("typing");

function type() {

  if (i < text.length) {

    typing.textContent += text[i];

    i++;

    setTimeout(type, 120);

  }

}

type();

/* 時計 */

function updateClock() {

  const now = new Date();

  const clock = document.getElementById("clock");

  clock.textContent = now.toLocaleTimeString();

}

setInterval(updateClock, 1000);

updateClock();

/* ダークモード */

function toggleMode() {

  document.body.classList.toggle("dark");

}
</script>
</body>
</html>
